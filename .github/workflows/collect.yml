name: Recolectar datos del mercado

on:
  schedule:
    # cada 30 minutos (UTC). Ajusta según tus necesidades / rate-limits.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

# Necesario para que la Action pueda commitear los snapshots al repo.
permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Recolectar snapshot
        env:
          # Si POESESSID no está definido, el script cae a modo MOCK.
          POESESSID: ${{ secrets.POESESSID }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
        run: node scripts/collect.mjs

      - name: Commitear datos
        run: |
          git config user.name "poe-trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "data: snapshot $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
